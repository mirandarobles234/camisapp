    <body>
<!-- Dentro del body HTML -->
<h2>Diseña tu Camiseta</h2>
<div class="camiseta-container">
  <svg id="camiseta-svg" width="300" height="400" viewBox="0 0 300 400">
    <!-- Definimos las partes de la camiseta como shapes SVG -->
    <!-- Torso de la camiseta -->
    <path id="torso" class="parte-camiseta" 
          d="M150,50 L100,100 L100,250 L200,250 L200,100 Z" 
          fill="#ffffff" stroke="#000000" />
    <!-- Manga Izquierda -->
    <path id="manga-izquierda" class="parte-camiseta" 
          d="M100,100 L50,80 L50,150 L100,150 Z" 
          fill="#ffffff" stroke="#000000" />
    <!-- Manga Derecha -->
    <path id="manga-derecha" class="parte-camiseta" 
          d="M200,100 L250,80 L250,150 L200,150 Z" 
          fill="#ffffff" stroke="#000000" />
    <!-- Cuello -->
    <circle id="cuello" class="parte-camiseta" 
            cx="150" cy="50" r="20" 
            fill="#ffffff" stroke="#000000" />
  </svg>
</div>
</html>
